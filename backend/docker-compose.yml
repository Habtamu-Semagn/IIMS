version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: edugov
      POSTGRES_PASSWORD: edugov
      POSTGRES_DB: edugov
    ports:
      - "5432:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  asset-service:
    build: ./asset-service
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgres://edugov:edugov@postgres:5432/edugov
      KAFKA_BROKER: kafka:9092

  ticket-service:
    build: ./ticket-service
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgres://edugov:edugov@postgres:5432/edugov
      KAFKA_BROKER: kafka:9092

  curriculum-service:
    build: ./curriculum-service
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgres://edugov:edugov@postgres:5432/edugov
      KAFKA_BROKER: kafka:9092

  training-service:
    build: ./training-service
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgres://edugov:edugov@postgres:5432/edugov
      KAFKA_BROKER: kafka:9092

  notification-service:
    build: ./notification-service
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092

  auth-service:
    build: ./auth-service
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgres://edugov:edugov@postgres:5432/edugov
      KAFKA_BROKER: kafka:9092